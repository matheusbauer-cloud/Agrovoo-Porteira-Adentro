<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgroVoo — Porteira Adentro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060d06;--bg2:#0a1a0a;--bg3:#111827;
  --border:#1f2d1f;--border2:#374151;
  --text:#e5e7eb;--muted:#9ca3af;--dim:#6b7280;
  --green:#22c55e;--gdark:#16a34a;--blue:#3b82f6;
  --yellow:#eab308;--orange:#f97316;--red:#ef4444;--lime:#84cc16;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
button,input,textarea,select{font-family:'DM Sans',sans-serif}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo-header{display:flex;align-items:center;gap:10px}
.logo-header img{height:32px;object-fit:contain}
.logo-header span{color:var(--green);font-size:13px;font-weight:700;letter-spacing:.5px}
.nav{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;overflow-x:auto}
.nav-btn{background:transparent;border:none;border-bottom:2px solid transparent;padding:12px 18px;color:var(--dim);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px;transition:all .15s}
.nav-btn.active{color:var(--green);border-bottom-color:var(--green);font-weight:700}
.content{max-width:800px;margin:0 auto;padding:24px 16px}
.gap{display:flex;flex-direction:column;gap:18px}
.badge{border-radius:6px;padding:2px 10px;font-size:11px;font-weight:700}
.b-op{background:#3b82f622;color:var(--blue);border:1px solid #3b82f644}
.b-mg{background:#8b5cf622;color:#8b5cf6;border:1px solid #8b5cf644}
.b-pend{background:#f9731622;color:var(--orange);border:1px solid #f9731644}
.b-def{background:#22c55e22;color:var(--green);border:1px solid #22c55e44}
.b-sem{background:#84cc1622;color:var(--lime);border:1px solid #84cc1644}
.b-adu{background:#eab30822;color:var(--yellow);border:1px solid #eab30844}
.b-notif{background:var(--red);color:#fff;border-radius:10px;padding:0 6px;font-size:10px;font-weight:900}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px}
.app-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:12px}
.app-card.pend{border-color:#f9731633}
.lbl{display:block;font-size:11px;font-weight:700;letter-spacing:1px;color:var(--dim);margin-bottom:6px;text-transform:uppercase}
.inp{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--green)}
.inp option{background:var(--bg3);color:var(--text)}
textarea.inp{resize:vertical}
.btn-green{background:linear-gradient(135deg,var(--green),var(--gdark));border:none;border-radius:10px;padding:13px;color:#fff;font-weight:700;font-size:14px;cursor:pointer;width:100%;transition:opacity .15s}
.btn-green:disabled{background:var(--border2);cursor:not-allowed}
.btn-gray{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px;color:var(--muted);font-weight:600;font-size:13px;cursor:pointer}
.btn-red-outline{background:transparent;border:1px solid #ef444433;border-radius:7px;padding:7px 12px;color:#ef444466;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-red-outline:hover{background:#ef444418;border-color:var(--red);color:var(--red)}
.btn-red{background:var(--red);border:none;border-radius:8px;padding:11px;color:#fff;font-weight:700;font-size:14px;cursor:pointer}
.m-btn{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 15px;color:var(--muted);font-weight:600;font-size:13px;cursor:pointer;transition:all .15s}
.m-def{background:#22c55e22;border-color:var(--green);color:var(--green)}
.m-sem{background:#84cc1622;border-color:var(--lime);color:var(--lime)}
.m-adu{background:#eab30822;border-color:var(--yellow);color:var(--yellow)}
.stars{display:flex;gap:4px}
.star{font-size:28px;cursor:pointer;color:var(--border2);user-select:none;transition:color .1s}
.star.on{color:var(--yellow)}
.star.sm{font-size:15px;cursor:default}
.overlay{position:fixed;inset:0;background:#000c;z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.modal{background:var(--bg2);border-radius:16px;padding:28px;max-width:400px;width:100%}
.modal-del{border:1px solid #ef444433}
.modal-rate{border:1px solid #22c55e33}
.login-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:var(--bg)}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:36px 32px;max-width:400px;width:100%}
.login-logos{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:28px;flex-wrap:wrap}
.login-logos img{height:48px;object-fit:contain}
.login-divider{width:1px;height:40px;background:var(--border2)}
.login-title{color:#f0fdf4;font-size:20px;font-weight:900;text-align:center;margin-bottom:4px}
.login-sub{color:var(--dim);font-size:12px;text-align:center;margin-bottom:28px;letter-spacing:.5px}
.login-err{background:#1f0000;border:1px solid #ef444444;border-radius:8px;padding:10px 14px;color:var(--red);font-size:13px;margin-bottom:14px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.progress{background:var(--bg3);border-radius:6px;height:8px;overflow:hidden;flex:1}
.progress-fill{height:100%;border-radius:6px;transition:width .5s}
.params{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.param{background:var(--bg3);border-radius:6px;padding:6px 10px;font-size:12px}
.param span{color:var(--dim)}
.alert-g{background:#0f1f0f;border:1px solid #22c55e44;border-radius:10px;padding:14px;color:var(--green);font-weight:700}
.alert-o{background:#1a0f00;border:1px solid #f9731633;border-radius:12px;padding:16px;display:flex;align-items:center;gap:12px}
.alert-r{background:#1f0000;border:1px solid #ef444444;border-radius:10px;padding:14px;color:var(--red);font-size:13px}
.alert-w{background:#1f1000;border:1px solid #f9731644;border-radius:10px;padding:12px;color:var(--orange);font-size:12px}
.ai-box{background:#0f1f0f;border:1px solid #22c55e44;border-radius:12px;padding:20px}
.ai-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ai-metric{background:var(--bg3);border-radius:10px;padding:16px;text-align:center}
.c-alta{background:#22c55e22;color:var(--green);border:1px solid #22c55e44;border-radius:6px;padding:2px 10px;font-size:11px;font-weight:700}
.c-media{background:#eab30822;color:var(--yellow);border:1px solid #eab30844;border-radius:6px;padding:2px 10px;font-size:11px;font-weight:700}
.c-baixa{background:#ef444422;color:var(--red);border:1px solid #ef444444;border-radius:6px;padding:2px 10px;font-size:11px;font-weight:700}
.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.full{grid-column:1/-1}
.row{display:flex;align-items:center;gap:10px}
.section-title{color:#f0fdf4;font-size:20px;font-weight:900}
.small-title{color:var(--muted);font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px}
.empty{text-align:center;padding:40px}
.wind-btn{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;color:var(--muted);font-weight:600;font-size:12px;cursor:pointer;transition:all .15s;width:100%;text-align:left;margin-bottom:8px}
.wind-btn.wa{background:#3b82f622;border-color:var(--blue);color:var(--blue)}
.loading-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.user-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:10px}
/* COMPASSO */
.compass-wrap{display:flex;flex-direction:column;align-items:center;gap:8px}
.compass{position:relative;width:120px;height:120px;border-radius:50%;background:var(--bg3);border:2px solid var(--border2)}
.compass-dir{position:absolute;display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;transform:translate(-50%,-50%)}
.compass-dir.sel{background:var(--green);border-color:var(--green);color:#fff}
.compass-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:24px;height:24px;border-radius:50%;background:var(--bg2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--dim)}
/* TALHAO CARD */
.talhao-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:10px}
@media(max-width:480px){.stats{grid-template-columns:1fr 1fr}.two{grid-template-columns:1fr}.full{grid-column:1}.compass{width:100px;height:100px}}
</style>
</head>

async function initDB(){
  db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
  const saved=localStorage.getItem('agrovoo_user');
  if(saved){S.user=JSON.parse(saved);await loadAll();}
  else{S.loading=false;render();}
}

async function loadAll(){
  S.loading=true;render();
  const [r1,r2]=await Promise.all([
    db.from('aplicacoes').select('*').order('created_at',{ascending:false}),
    db.from('talhoes').select('*').order('nome',{ascending:true})
  ]);
  S.apps=(r1.data||[]).map(r=>({
    id:r.id,date:r.data,manejo:r.manejo,altura:r.altura,largura:r.largura,vento:r.vento,
    op:r.operador,talhaoId:r.talhao_id,talhao:r.talhao,produto:r.produto,nota:r.nota,obs:r.observacao||'',
    dirVento:r.direcao_vento||'',sentidoFaixas:r.sentido_faixas||'',
    mudouFaixas:r.mudou_faixas||false,mudouHorario:r.mudou_faixas_horario||'',mudouJustif:r.mudou_faixas_justificativa||''
  }));
  S.talhoes=(r2.data||[]).filter(t=>t.ativo);
  S.loading=false;render();
}

async function loadApps(){
  const {data}=await db.from('aplicacoes').select('*').order('created_at',{ascending:false});
  S.apps=(data||[]).map(r=>({
    id:r.id,date:r.data,manejo:r.manejo,altura:r.altura,largura:r.largura,vento:r.vento,
    op:r.operador,talhaoId:r.talhao_id,talhao:r.talhao,produto:r.produto,nota:r.nota,obs:r.observacao||'',

    mudouFaixas:r.mudou_faixas||false,mudouHorario:r.mudou_faixas_horario||'',mudouJustif:r.mudou_faixas_justificativa||''
  }));
  render();
}

async function loadTalhoes(){

}

const manejoOf=id=>MANEJOS.find(m=>m.id===id)||MANEJOS[0];
const windOf=v=>WINDS.find(r=>v>=r.min&&v<r.max)||WINDS[3];
const rated=()=>S.apps.filter(a=>a.nota!==null&&a.nota!==undefined);
const pending=()=>S.apps.filter(a=>a.nota===null||a.nota===undefined);
const avgNota=()=>{const r=rated();return r.length?(r.reduce((s,a)=>s+a.nota,0)/r.length).toFixed(1):'--';};
const talhaoNome=id=>{const t=S.talhoes.find(t=>t.id==id);return t?t.nome:'--';};

function badgeHtml(mid){const m=manejoOf(mid);return `<span class="badge ${m.bcls}">${m.icon} ${m.label}</span>`;}
function starsHtml(val,fn,sm=false){
  return '<div class="stars">'+[1,2,3,4,5].map(n=>{
    const on=n<=val?'on':'';const sz=sm?'sm':'';
    const ev=fn?`onclick="${fn}(${n})"`:'' ;
    return `<span class="star ${on} ${sz}" ${ev}>&#9733;</span>`;
  }).join('')+'</div>';
}
function paramsHtml(a){
  const tn=a.talhaoId?talhaoNome(a.talhaoId):(a.talhao||'');
  return `<div class="params">
    ${tn?`<div class="param"><span>Talhao: </span>${tn}</div>`:''}
    ${a.produto?`<div class="param"><span>Produto: </span>${a.produto}</div>`:''}
    <div class="param"><span>Altura: </span>${a.altura}m</div>
    <div class="param"><span>Faixa: </span>${a.largura}m</div>
    ${a.dirVento?`<div class="param"><span>Dir.Vento: </span>${a.dirVento}</div>`:''}
    <div class="param"><span>Vel.: </span>${a.vento}km/h</div>
    ${a.sentidoFaixas?`<div class="param"><span>Faixas: </span>${a.sentidoFaixas}</div>`:''}
    ${a.mudouFaixas?`<div class="param" style="color:var(--orange)"><span>Mudou faixas: </span>${a.mudouHorario||'--'}</div>`:''}
  </div>`;
}

function compassHtml(selectedVal,fnName,label){
  let btns='';
  DIRS.forEach((d,i)=>{
    const [lp,tp]=DIR_POS[i];
    const sel=selectedVal===d?'sel':'';
    btns+=`<div class="compass-dir ${sel}" style="left:${lp}%;top:${tp}%" onclick="${fnName}('${d}')">${d}</div>`;
  });
  return `<div class="compass-wrap">
    <div style="color:var(--dim);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">${label}</div>
    <div class="compass">
      ${btns}
      <div class="compass-center">${selectedVal||'--'}</div>
    </div>
    ${selectedVal?`<div style="color:var(--green);font-size:12px;font-weight:700">${selectedVal}</div>`:'<div style="color:var(--dim);font-size:12px">Toque para selecionar</div>'}
  </div>`;
}

function analiseDerива(dirVento,sentidoFaixas,vento){
  const iV=DIRS.indexOf(dirVento);const iF=DIRS.indexOf(sentidoFaixas);
  if(iV<0||iF<0)return '';
  const diff=Math.abs(((iF-iV+8)%8));const angulo=Math.min(diff,8-diff)*45;
  let risco='';
  if(vento<5)risco='Vento calmo &mdash; baixo risco de deriva.';
  else if(angulo===0||angulo===180)risco='Faixas paralelas ao vento &mdash; risco ALTO de deriva lateral.';
  else if(angulo===90)risco='Faixas perpendiculares ao vento &mdash; sentido ideal.';
  else if(angulo<=45)risco='Faixas quase paralelas ao vento &mdash; risco moderado de deriva.';
  else risco='Faixas em angulo favoravel &mdash; baixo risco.';
  return `<strong style="color:var(--text)">Analise de deriva:</strong> Angulo faixa/vento: ${angulo} graus &mdash; ${risco}`;
}

  root.innerHTML=renderApp();

function renderLoading(){
  return `<div class="loading-screen">
    <img src="${LOGO_PORTEIRA}" style="height:60px;object-fit:contain;margin-bottom:8px">
    <div class="spinner"></div>
    <div style="color:var(--dim);font-size:13px">Carregando...</div>
  </div>`;
}

function renderLogin(){
  return `<div class="login-page">
    <div class="login-card">
      <div class="login-logos">
        <img src="${LOGO_PORTEIRA}" alt="Porteira Adentro">
        <div class="login-divider"></div>
        <img src="${LOGO_GUARA}" alt="Guara">
      </div>
      <div class="login-title">AgroVoo</div>
      <div class="login-sub">GESTAO DE APLICACOES COM DRONE</div>
      ${S.loginErr?`<div class="login-err">&#9888;&#65039; ${S.loginErr}</div>`:''}
      <div style="margin-bottom:14px">
        <label class="lbl">Usuario</label>
        <input id="l-user" type="text" class="inp" placeholder="seu.usuario" autocomplete="username" autocapitalize="none">
      </div>
      <div style="margin-bottom:20px">
        <label class="lbl">Senha</label>
        <input id="l-pass" type="password" class="inp" placeholder="..." autocomplete="current-password"
          onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn-green" onclick="doLogin()" ${S.loginLoading?'disabled':''}>
        ${S.loginLoading?'Entrando...':'Entrar'}
      </button>
      <p style="color:var(--dim);font-size:11px;text-align:center;margin-top:16px">Porteira Adentro 2025</p>
    </div>
  </div>`;
}

function renderApp(){
  const isOp=S.user.perfil==='operador';
  const navItems=isOp
    ?[{id:'nova',label:'Nova Aplicacao',icon:'+'},{id:'historico',label:'Historico',icon:'Lista'}]
    :[{id:'dashboard',label:'Dashboard',icon:'Dash'},{id:'avaliar',label:'Avaliar',icon:'Estrela',n:pending().length},{id:'historico',label:'Historico',icon:'Lista'},{id:'ia',label:'IA Recomenda',icon:'IA'},{id:'talhoes',label:'Talhoes',icon:'Mapa'},{id:'usuarios',label:'Usuarios',icon:'Usr'}];
  const perfBadge=isOp
    ?`<span class="badge b-op">Operador: ${S.user.nome}</span>`
    :`<span class="badge b-mg">Gestor: ${S.user.nome}</span>`;
  let body='';
  if(S.view==='nova')body=renderNova();
  else if(S.view==='dashboard')body=renderDash();
  else if(S.view==='avaliar')body=renderAvaliar();
  else if(S.view==='historico')body=renderHistorico();
  else if(S.view==='ia')body=renderIA();
  else if(S.view==='talhoes')body=renderTalhoes();
  else if(S.view==='usuarios')body=renderUsuarios();
  const delModal=S.delId!==null?renderDelModal():'';
  const rateModal=S.rateId!==null?renderRateModal():'';
  return `
    <div class="header">
      <div class="logo-header">
        <img src="${LOGO_PORTEIRA}" alt="Porteira Adentro">
        <span>AgroVoo</span>
      </div>
      <div class="row">
        ${perfBadge}
        <button onclick="doLogout()" style="background:transparent;border:1px solid var(--border2);border-radius:6px;color:var(--dim);font-size:11px;padding:3px 10px;cursor:pointer">Sair</button>
      </div>
    </div>
    <div class="nav">
      ${navItems.map(n=>`
        <button class="nav-btn ${S.view===n.id?'active':''}" onclick="nav('${n.id}')">
          ${n.label}
          ${n.n?`<span class="b-notif">${n.n}</span>`:''}
        </button>`).join('')}
    </div>
    <div class="content">${body}</div>
    ${delModal}${rateModal}`;
}

function renderDash(){
  const r=rated();const p=pending();const avg=avgNota();
  return `<div class="gap">
    <div style="display:flex;align-items:center;gap:14px">
      <img src="${LOGO_GUARA}" style="height:40px;object-fit:contain">
      <div><h2 class="section-title">Guara</h2><div style="color:var(--dim);font-size:12px">Dashboard de Aplicacoes</div></div>
    </div>
    <div class="stats">
      <div class="stat"><div style="font-size:24px;margin-bottom:4px">📋</div><div style="font-weight:900;font-size:22px;color:var(--blue)">${S.apps.length}</div><div style="color:var(--dim);font-size:11px;margin-top:2px">Total</div></div>
      <div class="stat"><div style="font-size:24px;margin-bottom:4px">⏳</div><div style="font-weight:900;font-size:22px;color:var(--orange)">${p.length}</div><div style="color:var(--dim);font-size:11px;margin-top:2px">Pendentes</div></div>
      <div class="stat"><div style="font-size:24px;margin-bottom:4px">⭐</div><div style="font-weight:900;font-size:22px;color:var(--yellow)">${avg}${avg!=='--'?' star':''}</div><div style="color:var(--dim);font-size:11px;margin-top:2px">Nota Media</div></div>
    </div>
    <div class="card">
      <div class="small-title">Notas por Tipo de Manejo</div>
      ${MANEJOS.map(m=>{
        const ma=r.filter(a=>a.manejo===m.id);
        const av=ma.length?(ma.reduce((s,a)=>s+a.nota,0)/ma.length):null;
        return `<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
          <span style="font-size:18px">${m.icon}</span>
          <span style="color:var(--text);font-size:13px;width:130px">${m.label}</span>
          <div class="progress"><div class="progress-fill" style="width:${av?av/5*100:0}%;background:${m.color}"></div></div>
          <span style="color:${m.color};font-weight:700;font-size:13px;width:32px;text-align:right">${av?av.toFixed(1):'--'}</span>
          <span style="color:var(--dim);font-size:11px">(${ma.length})</span>
        </div>`;
      }).join('')}
    </div>
    ${p.length?`<div class="alert-o">
      <span style="font-size:24px">⚠️</span>
      <div style="flex:1"><div style="color:var(--orange);font-weight:700;font-size:14px">${p.length} aplicacao(oes) aguardando avaliacao</div></div>
      <button onclick="nav('avaliar')" style="background:var(--orange);border:none;border-radius:8px;padding:8px 14px;color:#fff;font-weight:700;font-size:13px;cursor:pointer">Avaliar</button>
    </div>`:''}
    ${S.talhoes.length?`<div class="card"><div class="small-title">Talhoes Cadastrados (${S.talhoes.length})</div>
      ${S.talhoes.map(t=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
        <span style="color:var(--text);font-size:13px">📍 ${t.nome}</span>
        ${t.area_hectares?`<span style="color:var(--dim);font-size:12px">${t.area_hectares} ha</span>`:''}
      </div>`).join('')}
    </div>`:''}
  </div>`;
}

function renderNova(){
  const f=S.form;
  const hint=f.vento?`<div style="background:var(--bg3);border-radius:8px;padding:10px;display:flex;align-items:center;gap:8px"><span>💨</span><span style="color:var(--muted);font-size:12px">Condicao: <strong style="color:var(--text)">${windOf(parseFloat(f.vento)).label}</strong></span></div>`:'';
  const talhaoOpts=S.talhoes.length
    ?S.talhoes.map(t=>`<option value="${t.id}" ${f.talhaoId==t.id?'selected':''}>${t.nome}${t.area_hectares?' ('+t.area_hectares+' ha)':''}</option>`).join('')
    :'<option value="">Nenhum talhao cadastrado</option>';

  return `<div class="gap">
    <h2 class="section-title">Registrar Nova Aplicacao</h2>
    ${S.formOk?`<div class="alert-g">✅ Aplicacao salva com sucesso!</div>`:''}
    <div class="card gap" style="gap:16px">
      <div>
        <label class="lbl">Tipo de Manejo *</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${MANEJOS.map(m=>`<button class="m-btn ${f.manejo===m.id?m.mcls:''}" onclick="setManejo('${m.id}')">${m.icon} ${m.label}</button>`).join('')}
        </div>
      </div>
      <div class="two">
        <div><label class="lbl">Data *</label><input type="date" class="inp" value="${f.date}" onchange="sf('date',this.value)"></div>
        <div><label class="lbl">Operador *</label><input type="text" class="inp" placeholder="Seu nome" value="${f.op}" oninput="sf('op',this.value)"></div>
        <div class="full">
          <label class="lbl">Talhao *</label>
          <select class="inp" onchange="sf('talhaoId',this.value)">
            <option value="">Selecione o talhao...</option>
            ${talhaoOpts}
          </select>
        </div>
        <div class="full"><label class="lbl">Produto Aplicado *</label><input type="text" class="inp" placeholder="Ex: Azevem, Glifosato, Ureia" value="${f.produto}" oninput="sf('produto',this.value)"></div>
        <div><label class="lbl">Altura de Voo (m) *</label><input type="number" step="0.1" class="inp" placeholder="Ex: 3.5" value="${f.altura}" oninput="sf('altura',this.value)"></div>
        <div><label class="lbl">Largura de Faixa (m) *</label><input type="number" step="0.1" class="inp" placeholder="Ex: 6.0" value="${f.largura}" oninput="sf('largura',this.value)"></div>
        <div class="full"><label class="lbl">Velocidade do Vento (km/h) *</label><input type="number" step="0.5" class="inp" placeholder="Ex: 8" value="${f.vento}" oninput="sf('vento',this.value)"></div>
      </div>
      ${hint}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;justify-items:center;padding:8px 0">
        ${compassHtml(f.dirVento,'setDirVento','Direcao do Vento')}
        ${compassHtml(f.sentidoFaixas,'setSentidoFaixas','Sentido das Faixas')}
      </div>
      ${f.dirVento&&f.sentidoFaixas?`<div style="background:var(--bg3);border-radius:8px;padding:12px;font-size:12px;color:var(--muted)">${analiseDerива(f.dirVento,f.sentidoFaixas,parseFloat(f.vento)||0)}</div>`:''}
      <div>
        <label class="lbl" style="margin-bottom:10px">Mudou a direcao das faixas durante a aplicacao?</label>
        <div style="display:flex;gap:10px">
          <button class="m-btn ${f.mudouFaixas?'m-def':''}" onclick="sf('mudouFaixas',true);render()">✅ Sim</button>
          <button class="m-btn ${!f.mudouFaixas?'m-def':''}" onclick="sf('mudouFaixas',false);render()">Nao</button>
        </div>
      </div>
      ${f.mudouFaixas?`<div class="two">
        <div><label class="lbl">Horario da mudanca</label><input type="time" class="inp" value="${f.mudouHorario}" onchange="sf('mudouHorario',this.value)"></div>
        <div class="full"><label class="lbl">Justificativa</label><input type="text" class="inp" placeholder="Ex: Vento girou para SE" value="${f.mudouJustif}" oninput="sf('mudouJustif',this.value)"></div>
      </div>`:''}
      <div><label class="lbl">Observacoes</label><textarea class="inp" rows="2" placeholder="Condicoes do campo, problemas..." oninput="sf('obs',this.value)">${f.obs}</textarea></div>
      ${S.formErr?`<div style="color:var(--red);font-size:13px">⚠️ ${S.formErr}</div>`:''}
      <button class="btn-green" onclick="submitApp()" ${S.formSaving?'disabled':''}>
        ${S.formSaving?'Salvando...':'✅ Registrar Aplicacao'}
      </button>
    </div>
  </div>`;
}

function renderAvaliar(){
  const p=pending();
  if(!p.length)return `<div class="gap"><h2 class="section-title">Avaliar Aplicacoes</h2><div class="card"><div class="empty"><div style="font-size:40px;margin-bottom:10px">✅</div><div style="color:var(--green);font-weight:700">Todas avaliadas!</div></div></div></div>`;
  return `<div class="gap">
    <h2 class="section-title">Avaliar Aplicacoes</h2>
    ${p.map(a=>`
      <div class="app-card pend">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
          <div>
            <div style="color:var(--muted);font-size:11px;margin-bottom:4px">${a.date} · ${a.op}</div>
            ${badgeHtml(a.manejo)}
            ${a.talhaoId?`<div style="color:var(--text);font-size:13px;font-weight:600;margin-top:6px">📍 ${talhaoNome(a.talhaoId)}</div>`:''}
            ${a.produto?`<div style="color:var(--muted);font-size:12px;margin-top:2px">🧴 ${a.produto}</div>`:''}
          </div>
          <span class="badge b-pend">Pendente</span>
        </div>
        ${paramsHtml(a)}
        ${a.mudouFaixas?`<div class="alert-w" style="margin-top:8px;font-size:11px">⚠️ Mudou faixas as ${a.mudouHorario} — ${a.mudouJustif}</div>`:''}
        <div style="display:flex;gap:8px;margin-top:14px">
          <button onclick="openRate(${a.id})" style="flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px;color:var(--yellow);font-weight:700;font-size:13px;cursor:pointer">⭐ Dar Nota</button>
          <button class="btn-red-outline" onclick="openDel(${a.id})">Excluir</button>
        </div>
      </div>`).join('')}
  </div>`;
}

function renderHistorico(){
  if(!S.apps.length)return `<div class="gap"><h2 class="section-title">Historico</h2><div class="card"><div class="empty"><div style="font-size:40px;margin-bottom:10px">📋</div><div style="color:var(--muted);font-weight:700">Nenhuma aplicacao ainda</div></div></div></div>`;
  return `<div class="gap">
    <h2 class="section-title">Historico de Aplicacoes</h2>
    <button onclick="loadApps()" style="background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:8px 14px;color:var(--muted);font-size:12px;cursor:pointer;align-self:flex-start">Atualizar</button>
    ${S.apps.map(a=>`
      <div class="app-card ${!a.nota?'pend':''}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
          <div>
            <div style="color:var(--muted);font-size:11px;margin-bottom:4px">${a.date} · ${a.op}</div>
            ${badgeHtml(a.manejo)}
            ${a.talhaoId?`<div style="color:var(--text);font-size:13px;font-weight:600;margin-top:6px">📍 ${talhaoNome(a.talhaoId)}</div>`:''}
            ${a.produto?`<div style="color:var(--muted);font-size:12px;margin-top:2px">🧴 ${a.produto}</div>`:''}
          </div>
          ${a.nota?starsHtml(a.nota,null,true):`<span class="badge b-pend">Pendente</span>`}
        </div>
        ${paramsHtml(a)}
        ${a.mudouFaixas?`<div class="alert-w" style="margin-top:8px;font-size:11px">⚠️ Mudou faixas as ${a.mudouHorario} — ${a.mudouJustif}</div>`:''}
        ${a.obs?`<div style="color:var(--dim);font-size:12px;margin-top:8px;font-style:italic">"${a.obs}"</div>`:''}
        <div style="margin-top:12px;display:flex;justify-content:flex-end">
          <button class="btn-red-outline" onclick="openDel(${a.id})">Excluir</button>
        </div>
      </div>`).join('')}
  </div>`;
}

function renderIA(){
  const r=rated();
  return `<div class="gap">
    <div><h2 class="section-title">Recomendacao por IA</h2><p style="color:var(--dim);font-size:13px;margin-top:4px">Com base em ${r.length} aplicacoes avaliadas.</p></div>
    ${r.length<3
      ?`<div class="card"><div class="empty"><div style="font-size:40px;margin-bottom:10px">📊</div><div style="color:var(--muted);font-weight:700">Dados insuficientes</div><div style="color:var(--dim);font-size:13px;margin-top:4px">Sao necessarias ao menos 3 aplicacoes avaliadas</div></div></div>`
      :`<div class="card gap" style="gap:16px">
          <div class="two">
            <div>
              <label class="lbl">Tipo de Manejo</label>
              ${MANEJOS.map(m=>`<button class="m-btn ${S.aiManejo===m.id?m.mcls:''}" style="width:100%;margin-bottom:8px" onclick="setAIM('${m.id}')">${m.icon} ${m.label}</button>`).join('')}
            </div>
            <div>
              <label class="lbl">Faixa de Vento</label>
              ${WINDS.map((w,i)=>`<button class="wind-btn ${S.aiWind===i?'wa':''}" onclick="setAIW(${i})">💨 ${w.label}</button>`).join('')}
            </div>
          </div>
          <button class="btn-green" onclick="runAI()" ${S.aiLoading?'disabled':''}>
            ${S.aiLoading?'Analisando dados...':'🤖 Gerar Recomendacao com IA'}
          </button>
          ${S.aiResult?renderAIResult():''}
        </div>`}
  </div>`;
}

function renderAIResult(){
  const r=S.aiResult;
  if(r.erro)return `<div class="alert-r">Erro: ${r.erro}</div>`;
  const cc=r.confianca==='Alta'?'c-alta':r.confianca==='Media'?'c-media':'c-baixa';
  return `<div class="ai-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <span style="color:var(--green);font-weight:700;font-size:14px">✅ Recomendacao Gerada</span>
      <span class="${cc}">Confianca: ${r.confianca}</span>
    </div>
    <div class="ai-grid">
      <div class="ai-metric"><div style="color:var(--dim);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">Altura Ideal</div><div style="font-weight:900;font-size:32px;color:var(--green)">${r.altura_recomendada}<span style="font-size:13px;color:var(--dim)">m</span></div></div>
      <div class="ai-metric"><div style="color:var(--dim);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">Largura de Faixa</div><div style="font-weight:900;font-size:32px;color:var(--blue)">${r.largura_recomendada}<span style="font-size:13px;color:var(--dim)">m</span></div></div>
    </div>
    ${r.sentido_recomendado?`<div style="background:var(--bg3);border-radius:10px;padding:14px;margin-top:12px;text-align:center"><div style="color:var(--dim);font-size:11px;margin-bottom:4px">SENTIDO IDEAL DE FAIXAS</div><div style="color:var(--yellow);font-size:28px;font-weight:900">${r.sentido_recomendado}</div></div>`:''}
    <div style="background:var(--bg3);border-radius:10px;padding:14px;margin-top:12px"><div style="color:var(--muted);font-size:12px;line-height:1.6">📊 ${r.justificativa}</div></div>
    ${r.alertas?`<div class="alert-w" style="margin-top:10px">⚠️ ${r.alertas}</div>`:''}
  </div>`;
}

        ${S.newTalhaoSaving?'Salvando...':'➕ Cadastrar Talhao'}
      </button>
    </div>
    <div class="card">

      ${!S.talhoes.length?`<div style="color:var(--dim);font-size:13px;text-align:center;padding:20px">Nenhum talhao ainda</div>`:''}
      ${S.talhoes.map(t=>`
        <div class="talhao-card">
          <div style="flex:1">
            <div style="color:var(--text);font-weight:700;font-size:14px">📍 ${t.nome}</div>

            ${t.kml_conteudo?`<div style="color:var(--green);font-size:11px;margin-top:2px">✅ KML cadastrado</div>`:`<div style="color:var(--dim);font-size:11px;margin-top:2px">Sem KML</div>`}

          <button class="btn-red-outline" onclick="deleteTalhao(${t.id})">Excluir</button>

function renderUsuarios(){
  return `<div class="gap">
    <h2 class="section-title">Gerenciar Usuarios</h2>
    <div class="card gap" style="gap:14px">
      <div class="small-title">Adicionar Novo Usuario</div>
      ${S.newUserOk?`<div class="alert-g">✅ Usuario criado!</div>`:''}
      ${S.newUserErr?`<div class="alert-r">⚠️ ${S.newUserErr}</div>`:''}
      <div class="two">
        <div><label class="lbl">Nome</label><input type="text" class="inp" placeholder="Ex: Joao Silva" oninput="snu('nome',this.value)"></div>
        <div><label class="lbl">Usuario (login)</label><input type="text" class="inp" placeholder="Ex: joao.silva" autocapitalize="none" oninput="snu('usuario',this.value)"></div>
        <div><label class="lbl">Senha</label><input type="text" class="inp" placeholder="Crie uma senha" oninput="snu('senha',this.value)"></div>
        <div>
          <label class="lbl">Perfil</label>
          <div style="display:flex;gap:8px;margin-top:2px">
            <button class="m-btn ${S.newUser.perfil==='operador'?'m-def':''}" onclick="snu('perfil','operador')">Operador</button>
            <button class="m-btn ${S.newUser.perfil==='gestor'?'m-adu':''}" onclick="snu('perfil','gestor')">Gestor</button>
          </div>
        </div>
      </div>
      <button class="btn-green" onclick="createUser()" ${S.newUserSaving?'disabled':''}>${S.newUserSaving?'Criando...':'➕ Criar Usuario'}</button>
    </div>
    <div class="card">
      <div class="small-title">Usuarios Cadastrados</div>
      ${S.usuarios.map(u=>`
        <div class="user-card">
          <div style="flex:1">
            <div style="color:var(--text);font-weight:700;font-size:14px">${u.nome}</div>
            <div style="color:var(--dim);font-size:12px;margin-top:2px">@${u.usuario} · ${u.perfil==='gestor'?'Gestor':'Operador'}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="background:${u.ativo?'#22c55e22':'#ef444422'};color:${u.ativo?'var(--green)':'var(--red)'};border:1px solid ${u.ativo?'#22c55e44':'#ef444444'};border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700">${u.ativo?'Ativo':'Inativo'}</span>
            ${u.usuario!=='admin'?`<button class="btn-red-outline" onclick="toggleUser(${u.id},${u.ativo})">${u.ativo?'Desativar':'Ativar'}</button>`:''}
          </div>
        </div>`).join('')}
    </div>
  </div>`;
}

function renderDelModal(){
  const a=S.apps.find(x=>x.id===S.delId);if(!a)return'';
  return `<div class="overlay" onclick="if(event.target===this)closeDel()">
    <div class="modal modal-del">
      <div style="text-align:center;margin-bottom:20px">
        <div style="font-size:44px;margin-bottom:10px">🗑</div>
        <h3 style="color:#f0fdf4;font-size:17px;margin-bottom:6px">Excluir aplicacao?</h3>
        <p style="color:var(--dim);font-size:13px">Esta acao nao pode ser desfeita.</p>
      </div>
      <div style="background:var(--bg3);border-radius:10px;padding:14px;margin-bottom:20px">
        <div style="color:var(--muted);font-size:12px;margin-bottom:6px">${a.date} · ${a.op}</div>
        ${badgeHtml(a.manejo)}
        ${a.talhaoId?`<div style="color:var(--text);font-size:13px;margin-top:8px">📍 ${talhaoNome(a.talhaoId)}</div>`:''}
        ${a.produto?`<div style="color:var(--muted);font-size:12px;margin-top:2px">🧴 ${a.produto}</div>`:''}
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn-gray" style="flex:1" onclick="closeDel()">Cancelar</button>
        <button class="btn-red" style="flex:2" onclick="confirmDel()">Sim, excluir</button>
      </div>
    </div>

}

function renderRateModal(){
  const a=S.apps.find(x=>x.id===S.rateId);if(!a)return'';
  return `<div class="overlay" onclick="if(event.target===this)closeRate()">
    <div class="modal modal-rate">
      <h3 style="color:#f0fdf4;margin:0 0 4px;font-size:17px">Avaliar Aplicacao</h3>
      <div style="color:var(--dim);font-size:12px;margin-bottom:4px">${a.date} · ${a.op}</div>
      ${a.talhaoId?`<div style="color:var(--text);font-size:13px;font-weight:600;margin-bottom:2px">📍 ${talhaoNome(a.talhaoId)}</div>`:''}
      ${a.produto?`<div style="color:var(--muted);font-size:12px;margin-bottom:12px">🧴 ${a.produto}</div>`:'<div style="margin-bottom:12px"></div>'}
      ${badgeHtml(a.manejo)}
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:14px 0">
        ${[['Altura',a.altura+'m'],['Faixa',a.largura+'m'],['Vento',a.vento+'km/h']].map(([l,v])=>`
          <div style="background:var(--bg3);border-radius:8px;padding:10px;text-align:center">
            <div style="color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.5px">${l}</div>
            <div style="color:var(--text);font-weight:700;font-size:14px;margin-top:2px">${v}</div>
          </div>`).join('')}
      </div>
      ${a.dirVento||a.sentidoFaixas?`<div style="background:var(--bg3);border-radius:8px;padding:10px;margin-bottom:12px;font-size:12px;color:var(--muted)">${analiseDerива(a.dirVento,a.sentidoFaixas,a.vento)}</div>`:''}
      <div style="margin-bottom:14px">
        <div style="color:var(--muted);font-size:12px;margin-bottom:8px">Nota de qualidade:</div>
        ${starsHtml(S.rateNota,'setNota')}
      </div>
      <textarea class="inp" rows="2" placeholder="Observacao (opcional)" style="margin-bottom:16px" oninput="S.rateObs=this.value">${S.rateObs}</textarea>
      <div style="display:flex;gap:10px">
        <button class="btn-gray" style="flex:1" onclick="closeRate()">Cancelar</button>
        <button onclick="submitRate()" style="flex:2;background:${S.rateNota?'linear-gradient(135deg,#22c55e,#16a34a)':'var(--border2)'};border:none;border-radius:8px;padding:11px;color:#fff;font-weight:700;font-size:13px;cursor:${S.rateNota?'pointer':'not-allowed'}"
          ${!S.rateNota?'disabled':''}>Salvar Avaliacao</button>
      </div>
    </div>
  </div>`;
}

// ACTIONS
async function doLogin(){
  const usuario=document.getElementById('l-user').value.trim().toLowerCase();
  const senha=document.getElementById('l-pass').value;
  if(!usuario||!senha){S.loginErr='Preencha usuario e senha.';render();return;}
  S.loginLoading=true;S.loginErr='';render();
  const {data,error}=await db.from('usuarios').select('*').eq('usuario',usuario).eq('senha',senha).eq('ativo',true).single();
  S.loginLoading=false;
  if(error||!data){S.loginErr='Usuario ou senha incorretos.';render();return;}
  S.user=data;localStorage.setItem('agrovoo_user',JSON.stringify(data));
  S.view=data.perfil==='operador'?'nova':'dashboard';
  await loadAll();
}
function doLogout(){localStorage.removeItem('agrovoo_user');S.user=null;S.apps=[];S.talhoes=[];S.view='dashboard';render();}
function nav(v){S.view=v;S.aiResult=null;if(v==='usuarios')loadUsuarios();if(v==='talhoes')loadTalhoes();render();}
function setManejo(id){S.form.manejo=id;render();}
function sf(f,v){S.form[f]=v;if(f==='mudouFaixas')render();}
function snu(f,v){S.newUser[f]=v;}
function snt(f,v){S.newTalhao[f]=v;}
function setDirVento(d){S.form.dirVento=d;render();}
function setSentidoFaixas(d){S.form.sentidoFaixas=d;render();}

function handleKML(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    const kml=e.target.result;S.newTalhao.kml=kml;
    const areaMatch=kml.match(/<area>([\d.]+)<\/area>/i)||kml.match(/area[^>]*>([\d.]+)/i);
    if(areaMatch){S.newTalhao.area=parseFloat(areaMatch[1]).toFixed(2);}
    render();
  };
  reader.readAsText(file);
}

async function submitApp(){
  const f=S.form;
  if(!f.date||!f.altura||!f.largura||!f.vento||!f.op||!f.talhaoId||!f.produto){S.formErr='Preencha todos os campos obrigatorios.';render();return;}
  S.formSaving=true;S.formErr='';render();
  const {data,error}=await db.from('aplicacoes').insert([{
    data:f.date,manejo:f.manejo,altura:parseFloat(f.altura),largura:parseFloat(f.largura),
    vento:parseFloat(f.vento),operador:f.op,talhao_id:f.talhaoId,talhao:talhaoNome(f.talhaoId),
    produto:f.produto,observacao:f.obs,nota:null,
    direcao_vento:f.dirVento||null,sentido_faixas:f.sentidoFaixas||null,
    mudou_faixas:f.mudouFaixas,mudou_faixas_horario:f.mudouHorario||null,
    mudou_faixas_justificativa:f.mudouJustif||null
  }]).select().single();
  S.formSaving=false;
  if(error){S.formErr='Erro ao salvar. Tente novamente.';render();return;}
  S.apps.unshift({id:data.id,date:data.data,manejo:data.manejo,altura:data.altura,largura:data.largura,vento:data.vento,op:data.operador,talhaoId:data.talhao_id,talhao:data.talhao,produto:data.produto,nota:null,obs:data.observacao||'',dirVento:data.direcao_vento||'',sentidoFaixas:data.sentido_faixas||'',mudouFaixas:data.mudou_faixas||false,mudouHorario:data.mudou_faixas_horario||'',mudouJustif:data.mudou_faixas_justificativa||''});
  S.form={date:'',manejo:'defensivos',altura:'',largura:'',vento:'',op:'',talhaoId:'',produto:'',obs:'',dirVento:'',sentidoFaixas:'',mudouFaixas:false,mudouHorario:'',mudouJustif:''};
  S.formOk=true;render();
  setTimeout(()=>{S.formOk=false;render();},3000);
}

function openDel(id){S.delId=id;render();}
function closeDel(){S.delId=null;render();}
async function confirmDel(){
  await db.from('aplicacoes').delete().eq('id',S.delId);
  S.apps=S.apps.filter(a=>a.id!==S.delId);S.delId=null;render();
}
function openRate(id){S.rateId=id;S.rateNota=0;S.rateObs='';render();}
function closeRate(){S.rateId=null;render();}
function setNota(n){S.rateNota=n;render();}
async function submitRate(){
  if(!S.rateNota)return;
  const {error}=await db.from('aplicacoes').update({nota:S.rateNota,observacao:S.rateObs}).eq('id',S.rateId);
  if(error){alert('Erro ao salvar.');return;}
  const i=S.apps.findIndex(a=>a.id===S.rateId);
  S.apps[i].nota=S.rateNota;S.apps[i].obs=S.rateObs;S.rateId=null;render();
}
function setAIM(id){S.aiManejo=id;S.aiResult=null;render();}
function setAIW(i){S.aiWind=i;S.aiResult=null;render();}
async function runAI(){
  S.aiLoading=true;S.aiResult=null;render();
  const r=rated();const w=WINDS[S.aiWind];
  const ctx=r.map(a=>`Manejo:${a.manejo}, Talhao:${a.talhaoId?talhaoNome(a.talhaoId):(a.talhao||'--')}, Produto:${a.produto||'--'}, Altura:${a.altura}m, Largura:${a.largura}m, VelVento:${a.vento}km/h, DirVento:${a.dirVento||'--'}, SentidoFaixas:${a.sentidoFaixas||'--'}, MudouFaixas:${a.mudouFaixas?'Sim':'Nao'}, Nota:${a.nota}/5, Obs:${a.obs||'--'}`).join('\n');
  const prompt=`Voce e especialista em drones agricolas. Analise os dados e gere recomendacoes.

Dados historicos avaliados:
${ctx}

Considere especialmente o angulo entre direcao do vento e sentido das faixas — isso impacta diretamente na deriva.
Notas altas = boa qualidade. Notas baixas = problemas.

Para manejo "${S.aiManejo}" com vento ${w.label} (${w.min}-${w.max}km/h):
1. Altura de voo ideal
2. Largura de faixa ideal
3. Sentido ideal de faixas (N, NE, L, SE, S, SO, O, NO)
4. Justificativa tecnica

Responda SOMENTE em JSON:
{"altura_recomendada":numero,"largura_recomendada":numero,"sentido_recomendado":"direcao","justificativa":"texto","confianca":"Alta|Media|Baixa","alertas":"texto ou null"}`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const d=await res.json();
    const txt=(d.content||[]).map(i=>i.text||'').join('').replace(/```json|```/g,'').trim();
    S.aiResult=JSON.parse(txt);
  }catch(e){S.aiResult={erro:'Erro ao consultar a IA.'};}
  S.aiLoading=false;render();
}

async function createTalhao(){
  const t=S.newTalhao;
  if(!t.nome){S.newTalhaoErr='Informe o nome do talhao.';render();return;}
  S.newTalhaoSaving=true;S.newTalhaoErr='';render();
  const {error}=await db.from('talhoes').insert([{nome:t.nome,area_hectares:t.area?parseFloat(t.area):null,kml_conteudo:t.kml||null,ativo:true}]);
  S.newTalhaoSaving=false;
  if(error){S.newTalhaoErr='Erro ao salvar.';render();return;}
  S.newTalhao={nome:'',kml:'',area:''};S.newTalhaoOk=true;
  await loadTalhoes();
  setTimeout(()=>{S.newTalhaoOk=false;render();},3000);
}

async function deleteTalhao(id){
  await db.from('talhoes').update({ativo:false}).eq('id',id);
  await loadTalhoes();
}

async function createUser(){
  const u=S.newUser;
  if(!u.nome||!u.usuario||!u.senha){S.newUserErr='Preencha todos os campos.';render();return;}
  S.newUserSaving=true;S.newUserErr='';render();
  const {error}=await db.from('usuarios').insert([{nome:u.nome,usuario:u.usuario.toLowerCase(),senha:u.senha,perfil:u.perfil,ativo:true}]);
  S.newUserSaving=false;
  if(error){S.newUserErr='Erro ao criar. Usuario ja existe?';render();return;}
  S.newUser={nome:'',usuario:'',senha:'',perfil:'operador'};S.newUserOk=true;
  await loadUsuarios();
  setTimeout(()=>{S.newUserOk=false;render();},3000);
}

async function toggleUser(id,ativo){
  await db.from('usuarios').update({ativo:!ativo}).eq('id',id);
  await loadUsuarios();
}

render();
initDB();

</script>
